<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ANT-Stock/Front/wms/pages/usuario/Usuário.css">
    <link rel="icon" href="/ANT-Stock/Front/wms/img/favicon.png" type="image/png">
    <title>Perfil do Usuário - ANT Stock</title>
</head>
<body>

    <aside class="esquerda">
        <div class="logo">
            <div class="imgLogoPlaceholder">ANT</div>
            <h1>ANT<br><span>Stock</span></h1>
        </div>
        <ul class="navList">
            <li><a href="/ANT-Stock/Front/wms/pages/home/home.html">Home</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/estoque/estoque.html">Estoque</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/Entrada&Saída/entrada&saida.html">Entradas/Saídas</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/relatorios/relatorios.html">Relatórios</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/configuracoes/config.html">Configurações</a></li>
            <ul class="adicionais">
                <li><a href="#" class="logout-btn">Log Out</a></li>
            </ul>
        </ul>
    </aside>

    <main class="direita">
        <header id="cabeçario">
            <div id="Usuario-boasvindas">
                <h2>Olá,</h2>
                <p>seja bem-vindo(a) ao seu perfil</p>
            </div>
            
            <div class="dadosUser">
                <a href="/pages/usuario/Usuário.html" class="user-card-link">
                    <img src="/ANT-Stock/Front/wms/img/icon-7797704_640.png" alt="Usuario" id="imgUser">
                    <div class="user-text">
                        <p id="nome">-</p>
                        <p id="email">Email: <span class="email-highlight">-</span></p>
                    </div>
                </a>
            </div>
        </header>

        <div class="perfil-grid">
            
            <section class="card-perfil">
                <h3>Informações do Cadastro</h3>
                <form class="form-perfil" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" value="-" readonly>
                    </div>
                    <div class="form-group">
                        <label>E-mail Corporativo</label>
                        <input type="email" value="-" readonly>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cargo / Função</label>
                            <input type="text" value="-" readonly>
                        </div>
                        <div class="form-group">
                            <label>Matrícula</label>
                            <input type="text" value="-" readonly>
                        </div>
                    </div>
                </form>
            </section>

            <section class="card-perfil">
                <h3>Segurança da Conta</h3>
                <form class="form-perfil" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>Senha Atual</label>
                        <input type="password" placeholder="••••••••">
                    </div>
                    <div class="form-group">
                        <label>Nova Senha</label>
                        <input type="password" placeholder="Digite a nova senha">
                    </div>
                    <button type="submit" class="btn-secondary">Atualizar Senha</button>
                </form>
            </section>

            <section class="card-perfil full-width">
                <h3>Sua Atividade Recente no Sistema</h3>
                <div class="table-wrapper">
                    <table class="tabela-atividades">
                        <thead>
                            <tr>
                                <th>Ação / Operação</th>
                                <th>Módulo</th>
                                <th>Data/Hora</th>
                                <th>Status do Processo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Linhas inseridas dinamicamente conforme as ações do usuário em tempo real -->
                            <tr>
                                <td>-</td>
                                <td>-</td>
                                <td>-</td>
                                <td><span class="badge-status">-</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login-ANT STOCK</title>
</head>
<body>
    <main>
        <aside class="left">
            <img src="/ANT-Stock/Front/wms/img/ChatGPT Image 21 de mai. de 2026, 09_32_07.png" alt="alfredo inacion da trindade">
        </aside>
        <aside class="rigth">
            <div id="newAccount" class="login-container">
                <form id="loginForm">
                    <h2>login</h2>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit">Entrar</button>
                    <button onclick="createAccount()">Criar Conta</button>
                    <p id="mensagem"></p>
                </form>
            </div>
        </aside>
    </main>
    <script src="script.js"></script>
</body>

</html>

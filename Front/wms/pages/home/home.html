<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ANT-Stock/Front/wms/pages/home/home.css">
    <link rel="icon" href="/ANT-Stock/Front/wms/img/favicon.png" type="image/png">
    <title>Home - ANT Stock</title>
</head>
<body>

    <aside class="esquerda">
        <div class="logo">
            <div class="imgLogoPlaceholder">ANT</div>
            <h1>ANT<br><span>Stock</span></h1>
        </div>
        <ul class="navList">
            <li><a href="/ANT-Stock/Front/wms/pages/home/home.html">Home</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/estoque/estoque.html">Estoque</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/Entrada&Saída/entrada&saida.html">Entradas/Saídas</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/relatorios/relatorios.html">Relatórios</a></li>
            <li><a href="/ANT-Stock/Front/wms/pages/configuracoes/config.html">Configurações</a></li>
            <ul class="adicionais">
                <li><a href="#" class="logout-btn">Log Out</a></li>
            </ul>
        </ul>
    </aside>

    <main class="direita">
        
        <header class="main-header">
            <div class="header-titulo">
                <h2>Painel de Controle</h2>
                <p class="data-atual">-</p>
            </div>

            <div class="dadosUser-header">
                <a href="/ANT-Stock/Front/wms/pages/usuario/Usuario.html" class="user-header-link" title="Acessar meu perfil">
                    <img src="/ANT-Stock/Front/wms/img/icon-7797704_640.png" alt="Foto do Usuário" id="imgUserHeader">
                    <div class="user-header-text">
                        <span class="user-name">-</span>
                        <span class="user-role">-</span>
                    </div>
                </a>
            </div>
        </header>

        <section class="kpi-container">
            <div class="card-kpi">
                <h3>Recebimento (Hoje)</h3>
                <p class="kpi-value">- <span class="kpi-sub">-</span></p>
            </div>
            <div class="card-kpi alerta">
                <h3>Expedição Pendente</h3>
                <p class="kpi-value">- <span class="kpi-sub">-</span></p>
            </div>
            <div class="card-kpi capacidade">
                <h3>Ocupação do Armazém</h3>
                <p class="kpi-value">-</p>
            </div>
        </section>

        <section id="notificacoes-container">
            <h3>Alertas e Notificações do Sistema</h3>
            <div class="lista-notificacoes">
                <!-- Os itens de notificação podem ser gerados dinamicamente via JS -->
                <div class="item-notificacao">
                    <span class="sino-icon">-</span>
                    <div class="notificacao-texto">
                        <h4></h4>
                        <p></p>
                    </div>
                    <span class="notificacao-tempo">-</span>
                </div>
            </div>
        </section>

    </main>

    <script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }
</script>
</body>
</html>

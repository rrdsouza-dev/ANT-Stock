<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="/ANT-Stock/Front/wms/img/favicon.png" type="image/png">
    <title>Login - ANT STOCK</title>
</head>
<body>
    <main>
        <aside class="left">
            <!-- Imagem de ilustração ajustada para o novo arquivo -->
            <img src="/ANT-Stock/Front/wms/img/favicon.png" alt="ANT Stock Logo">
        </aside>
        <aside class="rigth">
            <div id="newAccount" class="login-container">
                <form id="loginForm">
                    <h2>Login</h2>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit">Entrar</button>
                    <button type="button" onclick="createAccount()">Criar Conta</button>
                    <p id="mensagem"></p>
                </form>
            </div>
        </aside>
    </main>
    <script src="script.js"></script>
</body>
</html>
